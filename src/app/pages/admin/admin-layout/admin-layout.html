<div class="admin-shell">
  <aside class="admin-nav" aria-label="Menu administrativo">
    <div class="admin-nav__brand">
      <span class="admin-nav__logo" aria-hidden="true">LIA</span>
      <span class="admin-nav__subtitle">Administração</span>
    </div>

    <nav class="admin-nav__sections">
      <div class="admin-nav__section" *ngFor="let section of sections">
        <p class="admin-nav__section-title">{{ section.title }}</p>
        <a
          *ngFor="let item of section.items"
          [routerLink]="item.path"
          routerLinkActive="is-active"
          class="admin-nav__link"
        >
          <span class="material-symbols-outlined admin-nav__icon" aria-hidden="true">{{ item.icon }}</span>
          <span class="admin-nav__label">{{ item.label }}</span>
        </a>
      </div>
    </nav>

    <a routerLink="/" class="admin-nav__back">Voltar ao site</a>
  </aside>

  <main class="admin-main">
    <router-outlet></router-outlet>
  </main>
</div>
