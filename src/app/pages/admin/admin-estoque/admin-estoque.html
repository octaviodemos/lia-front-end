<div class="admin-container">
  <h2>Painel de Admin - Adicionar Livro ao Estoque</h2>
  
  <form [formGroup]="estoqueForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="id_livro">Selecione o Livro do Catálogo</label>
      <select id="id_livro" formControlName="id_livro">
        <option [ngValue]="null" disabled>Selecione...</option>
        <option *ngFor="let livro of livrosDoCatalogo" [ngValue]="livro.id_livro">
          {{ livro.titulo }}
        </option>
      </select>
    </div>

    <div class="form-group">
      <label for="preco">Preço de Venda (R$)</label>
      <input id="preco" type="number" formControlName="preco">
    </div>

    <div class="form-group">
      <label for="condicao">Condição</label>
      <select id="condicao" formControlName="condicao">
        <option value="novo">Novo</option>
        <option value="usado_como_novo">Usado - Como Novo</option>
        <option value="usado_bom">Usado - Bom Estado</option>
        <option value="usado_aceitavel">Usado - Aceitável</option>
      </select>
    </div>

    <button type="submit" [disabled]="estoqueForm.invalid">Adicionar ao Estoque</button>
  </form>

  <div *ngIf="mensagemSucesso" class="mensagem-sucesso">
    {{ mensagemSucesso }}
  </div>

  <section class="lista-estoque" *ngIf="itensLista.length">
    <h3>Estoque cadastrado</h3>
    <div class="tabela-estoque">
      <div class="tabela-estoque__header">
        <span>ID</span>
        <span>Livro</span>
        <span>Preço</span>
        <span>Status</span>
      </div>
      <div class="tabela-estoque__row" *ngFor="let item of itensLista">
        <span>{{ item.id_estoque ?? item.id ?? '—' }}</span>
        <span>{{ tituloLivroNaLista(item) }}</span>
        <span>{{ item.preco != null ? (item.preco | number:'1.2-2') : '—' }}</span>
        <span>
          <span class="badge-status badge-status--ok" *ngIf="itemDisponivel(item)">Disponível</span>
          <span class="badge-status badge-status--off" *ngIf="!itemDisponivel(item)">Vendido</span>
        </span>
      </div>
    </div>
  </section>
</div>
