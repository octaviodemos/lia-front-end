<div class="register-container">
  <h2>Crie sua conta no LIA</h2>
  <p>Junte-se à nossa comunidade de amantes de livros.</p>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="nome">Nome Completo</label>
      <input id="nome" type="text" formControlName="nome">
    </div>
    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" formControlName="email">
    </div>
    <div class="form-group">
      <label for="telefone">Celular / WhatsApp (opcional)</label>
      <input
        id="telefone"
        type="text"
        formControlName="telefone"
        mask="(00) 00000-0000"
        placeholder="(48) 99999-0000"
        autocomplete="tel"
      >
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" type="password" formControlName="password" [class.input-error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
      <div class="error-msg" *ngIf="registerForm.get('password')?.hasError('minlength') && registerForm.get('password')?.touched">
        A senha deve ter no mínimo 6 caracteres.
      </div>
      <div class="error-msg" *ngIf="registerForm.get('password')?.hasError('required') && registerForm.get('password')?.touched">
        A senha é obrigatória.
      </div>
    </div>
    <div class="form-group">
      <label for="confirmarSenha">Confirmar Senha</label>
      <input id="confirmarSenha" type="password" formControlName="confirmarSenha" [class.input-error]="registerForm.get('confirmarSenha')?.invalid && registerForm.get('confirmarSenha')?.touched">
      <div class="error-msg" *ngIf="registerForm.get('confirmarSenha')?.hasError('passwordMismatch') && registerForm.get('confirmarSenha')?.touched">
        As senhas não coincidem.
      </div>
    </div>

    <div *ngIf="mensagemErro" class="mensagem-erro">
      {{ mensagemErro }}
    </div>

    <button type="submit" [disabled]="registerForm.invalid">Cadastrar</button>
  </form>

  <div class="login-link">
    <p>Já tem uma conta? <a routerLink="/login">Faça login</a></p>
  </div>
</div>
